			try {
				$("#enc").click(() => {
					var text = prompt("Enter text.");
					var result;
					if(text) {
						try {
							result = btoa(text.toString("ISO 8859-1").replaceAll("\\n", "\n").replaceAll("/n", "\n"));
						} catch(e) {
							alert(e);
						}
						if(result) {
							$("#r").text(result);
						}
					}
				});
				$("#dec").click(() => {
					var text = prompt("Enter text.");
					if(text) {
						try {
							var result;
							if(text.toUpperCase().startsWith("DATA:TEXT/PLAIN;BASE64,")) {
								result = atob(text.replace("data:text/plain;base64,", "")).toString("ascii");
							} else if(text.toUpperCase().startsWith("DATA:TEXT/PLAIN;BASE64,")) {
								result = atob(text.replace("data:text/plain;base64,", "")).toString("ascii");
							} else if(text.toUpperCase().startsWith("DATA:TEXT/PLAIN;UTF-8,") || text.toUpperCase().startsWith("DATA:TEXT/PLAIN;CHARSET=UTF-8,")) {
								result = atob(text.replace("data:text/plain;utf-8", "").replace("data:text/plain;charset=utf-8,", "")).toString("ascii");
							} else if(text.toUpperCase().startsWith("DATA:IMAGE/PNG;BASE64,")) {
								result = atob(text.replace("data:image/png;base64,", "")).toString("ascii");
							} else {
								result = atob(text).toString("ascii");
							}
						} catch(error) {
							alert(error);
						}
					}
					if(result) {
						alert(result);
					}
				});
