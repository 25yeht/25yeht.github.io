<!doctype html>
<html lang="en-US">
	<head>
		<meta charset="utf-8">
		<title>Runtime Environment</title>
		<style>
			@font-face {
				font-family: 'proxima_nova_rgregular';
				src: url('https://litmus.com/fonts/Emails/proximanova-regular-webfont.eot');
				src: url('https://litmus.com/fonts/Emails/proximanova-regular-webfont.eot?#iefix') format('embedded-opentype'),
					 url('https://litmus.com/fonts/Emails/proximanova-regular-webfont.woff') format('woff'),
					 url('https://litmus.com/fonts/Emails/proximanova-regular-webfont.ttf') format('truetype'),
					 url('https://litmus.com/fonts/Emails/proximanova-regular-webfont.svg#proxima_nova_rgregular') format('svg');
				font-weight: normal;
				font-style: normal;
			}
			@font-face {
				font-family: 'proxima_nova_rgbold';
				src: url('https://litmus.com/fonts/Emails/proximanova-bold-webfont.eot');
				src: url('https://litmus.com/fonts/Emails/proximanova-bold-webfont.eot?#iefix') format('embedded-opentype'),
					 url('https://litmus.com/fonts/Emails/proximanova-bold-webfont.woff') format('woff'),
					 url('https://litmus.com/fonts/Emails/proximanova-bold-webfont.ttf') format('truetype'),
					 url('https://litmus.com/fonts/Emails/proximanova-bold-webfont.svg#proxima_nova_rgbold') format('svg');
				font-weight: normal;
				font-style: normal;
			}

			@font-face {
				font-family: 'adelle_rgregular';
				src: url('https://litmus.com/fonts/Emails/adelle_reg-webfont.eot');
				src: url('https://litmus.com/fonts/Emails/adelle_reg-webfont.eot?#iefix') format('embedded-opentype'),
					 url('https://litmus.com/fonts/Emails/adelle_reg-webfont.woff') format('woff'),
					 url('https://litmus.com/fonts/Emails/adelle_reg-webfont.ttf') format('truetype'),
					 url('https://litmus.com/fonts/Emails/adelle_reg-webfont.svg#adelle_rgregular') format('svg');
				font-weight: normal;
				font-style: normal;
			}
			body {
				padding: 35px;
				font-family: 'proxima_nova_rgregular';
			}
			#storages {
				padding: 22px;
			}
			#stor-cont {
				color: black;
				font-size: 22px;
			}
			button {
				font-family: 'proxima_nova_rgregular';
			}
			h1, h2, h3 {
				font-family: 'proxima_nova_rgbold';
				/*-webkit-user-select: none;*/
			}
		</style>
	</head>
	<body>
		<div id="main-content">
			<h1>Runtime environment</h1><br>
			<button onclick="location.reload()">Reload</button><br><br>
			<div id="storages">
				<noscript>Please turn on JavaScript to use this page. :(</noscript>
				<h1 id="see"></h1>
				<div id="stor-cont"></div>
			</div>
		</div>
		<div id="protected-scripts">
			<script onerror="alert('There was an error loading the script. :(')">
				try {
					document.getElementById("see").innerHTML = "Here are the localStorage keys below:<br>";
					var seeInterval = setInterval(_ => {
					document.getElementById("stor-cont").innerHTML = Object.keys(localStorage).join("<br>") + "<br><br><h2>Values: </h2>" + Object.values(localStorage).join("<br>");
					}, 50);
				} catch(e) {
					alert(e);
				}
			</script>
		</div>
	</body>
</html>
